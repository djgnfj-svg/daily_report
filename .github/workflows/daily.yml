name: Weekly Report

on:
  schedule:
    # 21:00 UTC Sunday = 06:00 KST Monday
    - cron: '0 21 * * 0'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install agent
        working-directory: apps/agent
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run pipeline
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          SITE_URL: ${{ secrets.SITE_URL }}
          PYTHONPATH: apps/agent/src
        run: |
          python -c "
          from datetime import date
          from morningbrief.pipeline.orchestrator import run_for_date
          rid = run_for_date(date.today(), send=True)
          print(f'report={rid}')
          "

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              ...context.repo,
              title: `Weekly report failed: ${new Date().toISOString().slice(0, 10)}`,
              body: 'See workflow run logs.',
              labels: ['ops']
            })
